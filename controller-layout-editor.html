<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controller Layout Editor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d14; --surface: #13131f; --canvas-bg: #1a1a2e;
    --border: rgba(255,255,255,0.08); --border-hover: rgba(255,255,255,0.18);
    --accent: #7f77dd; --accent-dim: rgba(127,119,221,0.2);
    --text: #e8e8f0; --text-dim: rgba(232,232,240,0.45);
    --green: #4ade80; --panel-bg: rgba(13,13,20,0.97);
  }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 40px; }
  header { width: 100%; max-width: 900px; display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .logo span { color: var(--accent); }
  .tagline { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 0.05em; }
  .toolbar { width: 100%; max-width: 900px; display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
  .toolbar-group { display: flex; gap: 6px; align-items: center; }
  .toolbar-divider { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
  .toolbar-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }
  button { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-dim); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  button:hover { border-color: var(--border-hover); color: var(--text); background: rgba(255,255,255,0.05); }
  button.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.accent:hover { background: #9490e8; }
  button.danger { border-color: rgba(239,68,68,0.3); color: rgba(239,68,68,0.7); }
  button.danger:hover { border-color: rgba(239,68,68,0.6); color: #ef4444; background: rgba(239,68,68,0.08); }
  input[type="text"] { font-family: 'DM Mono', monospace; font-size: 12px; padding: 7px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); outline: none; width: 160px; transition: border-color 0.15s; }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text-dim); }
  .hint-bar { width: 100%; max-width: 900px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.04em; margin-bottom: 10px; display: flex; gap: 16px; flex-wrap: wrap; }
  .hint-bar span::before { content: '· '; }

  .canvas-outer { width: 100%; max-width: 900px; overflow-x: auto; }
  .canvas {
    position: relative;
    background: var(--canvas-bg);
    border-radius: 28px;
    width: 860px;
    height: 420px;
    border: 1.5px solid var(--border);
    user-select: none;
    cursor: default;
    flex-shrink: 0;
  }

  .btn { position: absolute; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.88); background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.35); border-radius: 50%; cursor: grab; box-sizing: border-box; touch-action: none; overflow: visible; }
  .btn:hover { border-color: rgba(255,255,255,0.55); }
  .btn.pill { border-radius: 100px; }
  .btn.rect { border-radius: 10px; }
  .btn.selected { outline: 2px solid var(--accent); outline-offset: 2px; z-index: 50; }
  .btn.dragging { cursor: grabbing; z-index: 100; }
  .btn .label { pointer-events: none; padding: 0 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .joystick-inner { width: 38%; height: 38%; border-radius: 50%; background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.35); pointer-events: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
  .btn.joystick .label { position: absolute; bottom: 6px; left: 0; right: 0; font-size: 10px; text-align: center; color: rgba(255,255,255,0.6); pointer-events: none; }

  /* Resize handles - 8 points around the element */
  .handle { position: absolute; background: var(--accent); border: 2px solid #0d0d14; z-index: 101; display: none; }
  .btn.selected .handle { display: block; }
  .handle.corner { width: 12px; height: 12px; border-radius: 50%; }
  .handle.edge { background: var(--accent); border-radius: 3px; }
  .handle.edge.h { width: 18px; height: 6px; }
  .handle.edge.v { width: 6px; height: 18px; }

  .h-nw { top: -7px;  left: -7px;  cursor: nw-resize; }
  .h-ne { top: -7px;  right: -7px; cursor: ne-resize; }
  .h-sw { bottom:-7px; left: -7px;  cursor: sw-resize; }
  .h-se { bottom:-7px; right: -7px; cursor: se-resize; }
  .h-n  { top: -4px;  left: 50%; transform: translateX(-50%); cursor: n-resize; }
  .h-s  { bottom:-4px; left: 50%; transform: translateX(-50%); cursor: s-resize; }
  .h-w  { left: -4px;  top: 50%; transform: translateY(-50%); cursor: w-resize; }
  .h-e  { right:-4px;  top: 50%; transform: translateY(-50%); cursor: e-resize; }

  .status-dot { position: absolute; top: 14px; right: 18px; display: flex; align-items: center; gap: 5px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--green); pointer-events: none; letter-spacing: 0.05em; }
  .status-dot::before { content: ''; display: block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); }

  .edit-panel { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: var(--panel-bg); border: 1px solid var(--border-hover); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.15s; white-space: nowrap; flex-wrap: wrap; justify-content: center; max-width: calc(100% - 32px); }
  .edit-panel.visible { opacity: 1; pointer-events: all; }
  .edit-panel label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; }
  .edit-panel input[type=range] { width: 70px; accent-color: var(--accent); cursor: pointer; padding: 0; border: none; background: none; }
  .edit-panel input[type=text].label-input { width: 110px; font-size: 11px; padding: 5px 8px; border-radius: 6px; }
  .edit-panel .val { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; color: var(--text); min-width: 26px; }
  .edit-panel .sep { width: 1px; height: 16px; background: var(--border); }

  .saved-panel { width: 100%; max-width: 900px; margin-top: 16px; }
  .saved-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
  .saved-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .saved-item { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 12px; color: var(--text-dim); }
  .saved-item:hover { border-color: var(--border-hover); color: var(--text); }
  .saved-item button { padding: 2px 8px; font-size: 11px; border-radius: 5px; border: none; background: var(--accent-dim); color: var(--accent); margin: 0; }
  .saved-item button:hover { background: var(--accent); color: #fff; }
  .saved-item .del-btn { background: rgba(239,68,68,0.1); color: rgba(239,68,68,0.6); padding: 2px 6px; }
  .saved-item .del-btn:hover { background: rgba(239,68,68,0.2); color: #ef4444; }
  .empty-state { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); padding: 10px 0; }
</style>
</head>
<body>

<header>
  <div class="logo">layout<span>.</span>editor</div>
  <div class="tagline">touch controller designer</div>
</header>

<div class="toolbar">
  <div class="toolbar-group">
    <span class="toolbar-label">Add</span>
    <button onclick="addButton('joystick')">+ Joystick</button>
    <button onclick="addButton('face')">+ Face btn</button>
    <button onclick="addButton('bumper')">+ Bumper</button>
    <button onclick="addButton('pill')">+ Pill btn</button>
  </div>
  <div class="toolbar-divider"></div>
  <div class="toolbar-group">
    <button class="danger" onclick="deleteSelected()">Delete selected</button>
    <button onclick="resetLayout()">Reset</button>
  </div>
  <div class="toolbar-divider"></div>
  <div class="toolbar-group">
    <span class="toolbar-label">Save</span>
    <input type="text" id="saveName" placeholder="Layout name…" maxlength="30">
    <button class="accent" onclick="saveLayout()">Save layout</button>
  </div>
</div>

<div class="hint-bar">
  <span>Click to select</span>
  <span>Drag center to move</span>
  <span>Drag any handle to resize</span>
  <span>Double-click to rename</span>
  <span>Delete key to remove</span>
</div>

<div class="canvas-outer">
  <div class="canvas" id="canvas">
    <div class="status-dot">Connected</div>

    <div class="btn pill" data-type="pill"          style="width:90px;height:28px;left:300px;top:14px;"><span class="label">⟳ Gyro Off</span></div>
    <div class="btn pill" data-type="pill"          style="width:122px;height:28px;left:406px;top:14px;"><span class="label">▶ Play on Phone</span></div>
    <div class="btn pill" data-type="pill"          style="width:82px;height:32px;left:340px;top:62px;"><span class="label">Start</span></div>
    <div class="btn pill" data-type="pill"          style="width:82px;height:32px;left:340px;top:106px;"><span class="label">Select</span></div>
    <div class="btn rect" data-type="bumper"        style="width:52px;height:36px;left:28px;top:220px;"><span class="label">LT</span></div>
    <div class="btn rect" data-type="bumper"        style="width:52px;height:36px;left:28px;top:268px;"><span class="label">LB</span></div>
    <div class="btn rect" data-type="bumper"        style="width:52px;height:36px;left:780px;top:220px;"><span class="label">RT</span></div>
    <div class="btn rect" data-type="bumper"        style="width:52px;height:36px;left:780px;top:268px;"><span class="label">RB</span></div>
    <div class="btn"      data-type="face"          style="width:56px;height:56px;left:672px;top:60px;"><span class="label">X</span></div>
    <div class="btn"      data-type="face"          style="width:56px;height:56px;left:610px;top:116px;"><span class="label">A</span></div>
    <div class="btn"      data-type="face"          style="width:56px;height:56px;left:734px;top:116px;"><span class="label">B</span></div>
    <div class="btn"      data-type="face"          style="width:56px;height:56px;left:672px;top:172px;"><span class="label">Y</span></div>
    <div class="btn joystick" data-type="joystick"  style="width:150px;height:150px;left:110px;top:200px;"><div class="joystick-inner"></div><span class="label">Left stick</span></div>
    <div class="btn joystick" data-type="joystick"  style="width:150px;height:150px;left:450px;top:200px;"><div class="joystick-inner"></div><span class="label">Right stick</span></div>

    <div class="edit-panel" id="editPanel">
      <label>Label</label>
      <input type="text" class="label-input" id="labelInput" maxlength="24" placeholder="Name…">
      <div class="sep"></div>
      <label>W</label>
      <input type="range" id="wSlider" min="20" max="300" step="1">
      <span class="val" id="wVal">—</span>
      <div class="sep"></div>
      <label>H</label>
      <input type="range" id="hSlider" min="20" max="300" step="1">
      <span class="val" id="hVal">—</span>
    </div>
  </div>
</div>

<div class="saved-panel">
  <div class="saved-title">Saved layouts</div>
  <div class="saved-list" id="savedList"></div>
</div>

<script>
(function() {
  const canvas      = document.getElementById('canvas');
  const editPanel   = document.getElementById('editPanel');
  const labelInput  = document.getElementById('labelInput');
  const wSlider     = document.getElementById('wSlider');
  const hSlider     = document.getElementById('hSlider');
  const wVal        = document.getElementById('wVal');
  const hVal        = document.getElementById('hVal');

  let selectedEl  = null;
  const defaultState = [];

  const HANDLES = [
    { cls: 'handle corner h-nw', dir: 'nw' },
    { cls: 'handle corner h-ne', dir: 'ne' },
    { cls: 'handle corner h-sw', dir: 'sw' },
    { cls: 'handle corner h-se', dir: 'se' },
    { cls: 'handle edge h h-n', dir: 'n' },
    { cls: 'handle edge h h-s', dir: 's' },
    { cls: 'handle edge v h-w', dir: 'w' },
    { cls: 'handle edge v h-e', dir: 'e' }
  ];

  canvas.querySelectorAll('.btn').forEach(el => {
    addHandles(el);
    defaultState.push(captureEl(el));
    initEl(el);
  });

  canvas.addEventListener('mousedown', function(e) {
    if (!e.target.closest('.btn') && !e.target.closest('#editPanel')) deselect();
  });

  function addHandles(el) {
    HANDLES.forEach(h => {
      const handle = document.createElement('div');
      handle.className = h.cls;
      handle.dataset.dir = h.dir;
      el.appendChild(handle);
    });
  }

  function captureEl(el) {
    return {
      type: el.dataset.type,
      left: parseFloat(el.style.left), top: parseFloat(el.style.top),
      width: parseFloat(el.style.width), height: parseFloat(el.style.height),
      label: el.querySelector('.label')?.textContent || ''
    };
  }

  function initEl(el) {
    el.addEventListener('mousedown', function(e) {
      if (e.target.classList.contains('handle')) return;
      e.preventDefault(); e.stopPropagation();
      selectEl(el);
      startDrag(el, e.clientX, e.clientY);
    });
    el.addEventListener('touchstart', function(e) {
      if (e.target.classList.contains('handle')) return;
      e.preventDefault(); e.stopPropagation();
      selectEl(el);
      startDrag(el, e.touches[0].clientX, e.touches[0].clientY, true);
    }, { passive: false });

    el.addEventListener('dblclick', function(e) {
      e.preventDefault(); e.stopPropagation();
      selectEl(el);
      labelInput.focus();
      labelInput.select();
    });

    el.querySelectorAll('.handle').forEach(handle => {
      handle.addEventListener('mousedown', function(e) {
        e.preventDefault(); e.stopPropagation();
        selectEl(el);
        startResize(el, e.clientX, e.clientY, handle.dataset.dir);
      });
      handle.addEventListener('touchstart', function(e) {
        e.preventDefault(); e.stopPropagation();
        selectEl(el);
        startResize(el, e.touches[0].clientX, e.touches[0].clientY, handle.dataset.dir, true);
      }, { passive: false });
    });
  }

  function selectEl(el) {
    if (selectedEl && selectedEl !== el) selectedEl.classList.remove('selected');
    selectedEl = el;
    el.classList.add('selected');
    editPanel.classList.add('visible');
    syncPanel();
  }

  function deselect() {
    if (selectedEl) selectedEl.classList.remove('selected');
    selectedEl = null;
    editPanel.classList.remove('visible');
  }

  function syncPanel() {
    if (!selectedEl) return;
    const w = Math.round(parseFloat(selectedEl.style.width));
    const h = Math.round(parseFloat(selectedEl.style.height));
    wSlider.value = w; wVal.textContent = w;
    hSlider.value = h; hVal.textContent = h;
    const labelEl = selectedEl.querySelector('.label');
    labelInput.value = labelEl ? labelEl.textContent : '';
  }

  labelInput.addEventListener('input', function() {
    if (!selectedEl) return;
    const labelEl = selectedEl.querySelector('.label');
    if (labelEl) labelEl.textContent = labelInput.value;
  });
  labelInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); labelInput.blur(); }
  });

  wSlider.addEventListener('input', function() {
    if (!selectedEl) return;
    selectedEl.style.width = wSlider.value + 'px';
    wVal.textContent = wSlider.value;
  });
  hSlider.addEventListener('input', function() {
    if (!selectedEl) return;
    selectedEl.style.height = hSlider.value + 'px';
    hVal.textContent = hSlider.value;
  });

  function startDrag(el, startCX, startCY, isTouch) {
    const startLeft = parseFloat(el.style.left);
    const startTop  = parseFloat(el.style.top);
    el.classList.add('dragging');

    function move(cx, cy) {
      const dx = cx - startCX;
      const dy = cy - startCY;
      const w = parseFloat(el.style.width);
      const h = parseFloat(el.style.height);
      el.style.left = Math.max(0, Math.min(canvas.offsetWidth  - w, startLeft + dx)) + 'px';
      el.style.top  = Math.max(0, Math.min(canvas.offsetHeight - h, startTop  + dy)) + 'px';
    }

    function onMove(e)  { move(e.clientX, e.clientY); }
    function onTouch(e) { e.preventDefault(); move(e.touches[0].clientX, e.touches[0].clientY); }
    function end() {
      el.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', end);
      document.removeEventListener('touchmove', onTouch);
      document.removeEventListener('touchend', end);
    }
    if (isTouch) { document.addEventListener('touchmove', onTouch, { passive: false }); document.addEventListener('touchend', end); }
    else         { document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', end); }
  }

  function startResize(el, startCX, startCY, dir, isTouch) {
    const startLeft = parseFloat(el.style.left);
    const startTop  = parseFloat(el.style.top);
    const startW    = parseFloat(el.style.width);
    const startH    = parseFloat(el.style.height);
    const MIN = 20;

    function move(cx, cy) {
      const dx = cx - startCX;
      const dy = cy - startCY;
      let newL = startLeft, newT = startTop, newW = startW, newH = startH;

      if (dir.includes('e')) newW = Math.max(MIN, startW + dx);
      if (dir.includes('s')) newH = Math.max(MIN, startH + dy);
      if (dir.includes('w')) {
        const wProposed = startW - dx;
        if (wProposed >= MIN) {
          newW = wProposed;
          newL = startLeft + dx;
        } else {
          newW = MIN;
          newL = startLeft + (startW - MIN);
        }
      }
      if (dir.includes('n')) {
        const hProposed = startH - dy;
        if (hProposed >= MIN) {
          newH = hProposed;
          newT = startTop + dy;
        } else {
          newH = MIN;
          newT = startTop + (startH - MIN);
        }
      }

      // Clamp to canvas
      newL = Math.max(0, Math.min(canvas.offsetWidth  - newW, newL));
      newT = Math.max(0, Math.min(canvas.offsetHeight - newH, newT));
      newW = Math.min(newW, canvas.offsetWidth  - newL);
      newH = Math.min(newH, canvas.offsetHeight - newT);

      el.style.left = newL + 'px';
      el.style.top  = newT + 'px';
      el.style.width  = newW + 'px';
      el.style.height = newH + 'px';
      if (selectedEl === el) syncPanel();
    }

    function onMove(e)  { move(e.clientX, e.clientY); }
    function onTouch(e) { e.preventDefault(); move(e.touches[0].clientX, e.touches[0].clientY); }
    function end() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', end);
      document.removeEventListener('touchmove', onTouch);
      document.removeEventListener('touchend', end);
    }
    if (isTouch) { document.addEventListener('touchmove', onTouch, { passive: false }); document.addEventListener('touchend', end); }
    else         { document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', end); }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function makeEl(type, left, top, width, height, label) {
    const el = document.createElement('div');
    el.dataset.type = type;
    let inner = '';
    if (type === 'joystick') {
      el.className = 'btn joystick';
      inner = `<div class="joystick-inner"></div><span class="label">${escapeHtml(label)}</span>`;
    } else if (type === 'bumper') {
      el.className = 'btn rect';
      inner = `<span class="label">${escapeHtml(label)}</span>`;
    } else if (type === 'pill') {
      el.className = 'btn pill';
      inner = `<span class="label">${escapeHtml(label)}</span>`;
    } else {
      el.className = 'btn';
      inner = `<span class="label">${escapeHtml(label)}</span>`;
    }
    el.innerHTML = inner;
    el.style.cssText = `width:${width}px;height:${height}px;left:${left}px;top:${top}px;`;
    addHandles(el);
    return el;
  }

  window.addButton = function(type) {
    const cx = canvas.offsetWidth  / 2;
    const cy = canvas.offsetHeight / 2;
    let el;
    if (type === 'joystick') el = makeEl('joystick', cx-70, cy-70, 140, 140, 'Stick');
    else if (type === 'face') el = makeEl('face', cx-26, cy-26, 52, 52, 'Btn');
    else if (type === 'bumper') el = makeEl('bumper', cx-26, cy-18, 52, 36, 'BTN');
    else el = makeEl('pill', cx-40, cy-15, 80, 30, 'Button');
    canvas.appendChild(el);
    initEl(el);
    selectEl(el);
    labelInput.focus();
    labelInput.select();
  };

  window.deleteSelected = function() {
    if (!selectedEl) return;
    selectedEl.remove(); selectedEl = null;
    editPanel.classList.remove('visible');
  };

  document.addEventListener('keydown', function(e) {
    if ((e.key === 'Delete' || e.key === 'Backspace') && selectedEl && document.activeElement.tagName !== 'INPUT') deleteSelected();
  });

  window.resetLayout = function() {
    canvas.querySelectorAll('.btn').forEach(el => el.remove());
    defaultState.forEach(s => {
      const el = makeEl(s.type, s.left, s.top, s.width, s.height, s.label);
      canvas.appendChild(el);
      initEl(el);
    });
    deselect();
  };

  function getLayouts() { try { return JSON.parse(localStorage.getItem('ctrl_layouts')||'{}'); } catch { return {}; } }
  function setLayouts(l){ localStorage.setItem('ctrl_layouts', JSON.stringify(l)); }

  function captureLayout() {
    return Array.from(canvas.querySelectorAll('.btn')).map(captureEl);
  }

  function applyLayout(btns) {
    canvas.querySelectorAll('.btn').forEach(el => el.remove());
    btns.forEach(s => {
      const el = makeEl(s.type || 'face', s.left, s.top, s.width, s.height, s.label || '');
      canvas.appendChild(el);
      initEl(el);
    });
    deselect();
  }

  window.saveLayout = function() {
    const name = document.getElementById('saveName').value.trim() || ('Layout '+new Date().toLocaleTimeString());
    const l = getLayouts(); l[name] = captureLayout(); setLayouts(l);
    document.getElementById('saveName').value = '';
    renderSaved();
  };

  function renderSaved() {
    const l = getLayouts(); const keys = Object.keys(l);
    const sl = document.getElementById('savedList');
    sl.innerHTML = keys.length ? '' : '<div class="empty-state">No saved layouts yet.</div>';
    keys.forEach(name => {
      const safe = name.replace(/'/g,"\\'");
      const item = document.createElement('div');
      item.className = 'saved-item';
      item.innerHTML = `<span>${escapeHtml(name)}</span><button onclick="loadLayout('${safe}')">Load</button><button class="del-btn" onclick="deleteLayout('${safe}')">✕</button>`;
      sl.appendChild(item);
    });
  }

  window.loadLayout   = function(n) { const l=getLayouts(); if(l[n]) applyLayout(l[n]); };
  window.deleteLayout = function(n) { const l=getLayouts(); delete l[n]; setLayouts(l); renderSaved(); };

  renderSaved();
})();
</script>
</body>
</html>
